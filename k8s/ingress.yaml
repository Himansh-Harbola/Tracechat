apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tracechat-ingress
  namespace: tracechat
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: tracechat.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: tracechat-api
                port:
                  number: 4000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tracechat-web
                port:
                  number: 5173
