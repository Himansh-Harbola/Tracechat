apiVersion: v1
kind: ConfigMap
metadata:
  name: tracechat-config
  namespace: tracechat
data:
  CLIENT_ORIGIN: "https://tracechat.example.com"
  LLM_PROVIDER: "gemini"
  GEMINI_MODEL: "gemini-2.5-flash-lite"
  OPENAI_MODEL: "gpt-4.1-mini"
  GROQ_MODEL: "llama-3.3-70b-versatile"
  REDIS_URL: "redis://redis:6379"
  DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/llm_logger?schema=public"
