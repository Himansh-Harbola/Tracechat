apiVersion: v1
kind: Service
metadata:
  name: tracechat-web
  namespace: tracechat
spec:
  ports:
    - port: 5173
      targetPort: 5173
  selector:
    app: tracechat-web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracechat-web
  namespace: tracechat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tracechat-web
  template:
    metadata:
      labels:
        app: tracechat-web
    spec:
      containers:
        - name: web
          image: tracechat-client:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5173
