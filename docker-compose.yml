services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: llm_logger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d llm_logger"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/llm_logger?schema=public
      REDIS_URL: redis://redis:6379
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-replace-me}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-replace-me}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
      GROQ_API_KEY: ${GROQ_API_KEY:-replace-me}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      PORT: 4000
      CLIENT_ORIGIN: http://localhost:5173
    ports:
      - "4000:4000"

  worker:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/llm_logger?schema=public
      REDIS_URL: redis://redis:6379
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-replace-me}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-replace-me}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
      GROQ_API_KEY: ${GROQ_API_KEY:-replace-me}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
    command: ["npm", "--workspace", "apps/server", "run", "start:worker"]

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:4000
    depends_on:
      - server
    ports:
      - "5173:5173"

volumes:
  postgres_data:
